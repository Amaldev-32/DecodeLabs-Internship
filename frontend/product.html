<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Craftverse</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <h1 class="logo" onclick="window.location.href='index.html'" style="cursor: pointer;">Craftverse</h1>
        </div>
        <div class="header-right" id="nav-actions">
            <button class="btn-text" id="seller-btn">Become a Seller</button>
            <div class="profile-menu">
                <span class="profile-icon">👤</span>
                <span class="profile-text">Login / Sign In</span>
            </div>
        </div>
    </header>

    <main class="container product-detail-container">
        <div id="product-details" class="product-details">
            <p>Loading product details...</p>
        </div>
    </main>

    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="auth-step-1">
                <h2>Login / Sign Up</h2>
                <div class="form-group">
                    <label>Choose Login Method</label>
                    <select id="login-method">
                        <option value="email">Email Address</option>
                        <option value="phone">Phone Number</option>
                    </select>
                </div>
                <div class="form-group">
                    <input type="text" id="auth-identifier" placeholder="Enter Email or Phone">
                </div>
                <button id="send-otp-btn" class="btn-primary">Send OTP</button>
            </div>
            <div id="auth-step-2" style="display: none;">
                <h2>Verify OTP</h2>
                <p>OTP sent to: <span id="display-identifier"></span></p>
                <div class="form-group">
                    <input type="text" id="otp-input" placeholder="Enter 6-digit OTP (123456)">
                </div>
                <button id="verify-otp-btn" class="btn-primary">Verify OTP</button>
            </div>
            <div id="auth-step-3" style="display: none;">
                <h2>Complete Profile</h2>
                <div class="form-group">
                    <input type="text" id="first-name" placeholder="First Name">
                </div>
                <div class="form-group">
                    <input type="text" id="last-name" placeholder="Last Name">
                </div>
                <div class="form-group">
                    <select id="gender">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <button id="complete-reg-btn" class="btn-primary">Sign In</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        async function fetchProductDetails() {
            try {
                const res = await fetch(`${API_URL}/products/${productId}`);
                const data = await res.json();
                if (data.success) {
                    renderProductDetails(data.product);
                }
            } catch (err) {
                console.error(err);
            }
        }

        function renderProductDetails(product) {
            const detailContainer = document.getElementById('product-details');
            detailContainer.innerHTML = `
                <div class="product-main">
                    <img src="${product.images && product.images[0] ? product.images[0] : 'https://via.placeholder.com/600x400'}" class="detail-image">
                    <div class="detail-info">
                        <h2>${product.name}</h2>
                        <p class="detail-price">$${product.price}</p>
                        <p class="detail-stock">Stock: ${product.stock}</p>
                        <p class="detail-desc">${product.description}</p>
                        <button class="btn-primary" id="buy-btn" ${product.stock <= 0 ? 'disabled' : ''}>
                            ${product.stock <= 0 ? 'Out of Stock' : 'Send Buy Request'}
                        </button>
                        <div id="seller-info" style="display: none; margin-top: 1rem; padding: 1rem; background: #e0f7fa; border-radius: 4px;">
                            <h3>Seller Contact Info</h3>
                            <p>Name: ${product.sellerId.firstName} ${product.sellerId.lastName}</p>
                            <p>Email: ${product.sellerId.email}</p>
                            <p>Phone: ${product.sellerId.phone}</p>
                        </div>
                    </div>
                </div>
                <div class="product-tabs">
                    <h3>Specifications</h3>
                    <p>${product.specifications || 'N/A'}</p>
                    <h3>Artistic Details</h3>
                    <p>${product.artisticDetails || 'N/A'}</p>
                    <h3>Build Quality</h3>
                    <p>${product.buildQuality || 'N/A'}</p>
                    ${product.faq && product.faq.length > 0 ? `
                        <h3>FAQ</h3>
                        <div class="faq-list">
                            ${product.faq.map(f => `
                                <div class="faq-item">
                                    <p><strong>Q: ${f.question}</strong></p>
                                    <p>A: ${f.answer}</p>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
                <div class="similar-products-section">
                    <h3>Similar Products</h3>
                    <div id="similar-products-grid" class="product-grid">
                        <p>Loading similar products...</p>
                    </div>
                </div>
                <div class="review-section">
                    <h3>Customer Reviews</h3>
                    <div id="reviews-list">
                        <p>No reviews yet.</p>
                    </div>
                    <div class="add-review" id="add-review-form" style="display: none; margin-top: 2rem;">
                        <h3>Add a Review</h3>
                        <div class="form-group">
                            <label>Rating</label>
                            <select id="review-rating">
                                <option value="5">5 Stars</option>
                                <option value="4">4 Stars</option>
                                <option value="3">3 Stars</option>
                                <option value="2">2 Stars</option>
                                <option value="1">1 Star</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Comment</label>
                            <textarea id="review-comment"></textarea>
                        </div>
                        <button id="submit-review-btn" class="btn-primary">Submit Review</button>
                    </div>
                </div>
            `;

            document.getElementById('buy-btn').addEventListener('click', async () => {
                const token = localStorage.getItem('token');
                if (!token) {
                    alert('Please login to send a buy request');
                    return;
                }

                try {
                    const res = await fetch(`${API_URL}/requests`, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ productId })
                    });
                    const data = await res.json();
                    if (data.success) {
                        alert('Buy request sent! You can now see the seller\'s contact info.');
                        document.getElementById('seller-info').style.display = 'block';
                    }
                } catch (err) {
                    console.error(err);
                }
            });

            fetchReviews(product._id);
            if (localStorage.getItem('token')) {
                document.getElementById('add-review-form').style.display = 'block';
                document.getElementById('submit-review-btn').onclick = () => submitReview(product._id);
            }
            fetchSimilarProducts(product.category, product._id);
        }

        async function fetchSimilarProducts(category, currentId) {
            try {
                const res = await fetch(`${API_URL}/products?category=${category}`);
                const data = await res.json();
                if (data.success) {
                    const similar = data.products.filter(p => p._id !== currentId).slice(0, 4);
                    renderSimilarProducts(similar);
                }
            } catch (err) {
                console.error(err);
            }
        }

        function renderSimilarProducts(products) {
            const grid = document.getElementById('similar-products-grid');
            if (products.length === 0) {
                grid.innerHTML = '<p>No similar products found.</p>';
                return;
            }
            grid.innerHTML = products.map(product => `
                <div class="product-card" onclick="window.location.href='product.html?id=${product._id}'">
                    <img src="${product.images && product.images[0] ? product.images[0] : 'https://via.placeholder.com/250x200'}" alt="${product.name}" class="product-image">
                    <div class="product-info">
                        <h2 class="product-name">${product.name}</h2>
                        <p class="product-price">$${product.price}</p>
                    </div>
                </div>
            `).join('');
        }

        async function fetchReviews(pid) {
            try {
                const res = await fetch(`${API_URL}/reviews/${pid}`);
                const data = await res.json();
                if (data.success && data.reviews.length > 0) {
                    document.getElementById('reviews-list').innerHTML = data.reviews.map(r => `
                        <div class="review-item">
                            <p><strong>${r.userId.firstName}:</strong> ${'★'.repeat(r.rating)}</p>
                            <p>${r.comment}</p>
                        </div>
                    `).join('');
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function submitReview(pid) {
            const rating = document.getElementById('review-rating').value;
            const comment = document.getElementById('review-comment').value;
            const token = localStorage.getItem('token');

            if (!comment) return alert('Please enter a comment');

            try {
                const res = await fetch(`${API_URL}/reviews`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ productId: pid, rating, comment })
                });
                const data = await res.json();
                if (data.success) {
                    alert('Review submitted!');
                    location.reload();
                }
            } catch (err) {
                console.error(err);
            }
        }

        if (productId) fetchProductDetails();
    </script>
</body>
</html>
