<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Craftverse</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <h1 class="logo" onclick="window.location.href='index.html'" style="cursor: pointer;">Craftverse</h1>
        </div>
        <div class="header-right">
            <button class="btn-text" onclick="window.location.href='index.html'">Home</button>
            <button class="btn-text" id="logout-btn">Logout</button>
        </div>
    </header>

    <main class="container">
        <div class="form-container">
            <h2>Manage Profile</h2>
            <div id="profile-display" class="profile-info-section">
                <!-- Profile details will be loaded here -->
            </div>
            <form id="edit-profile-form" style="display: none; margin-top: 20px;">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="edit-fname" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="edit-lname" required>
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select id="edit-gender">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Profile Image URL</label>
                    <input type="text" id="edit-pimg">
                </div>
                <button type="submit" class="btn-primary">Update Profile</button>
                <button type="button" id="cancel-edit" class="btn-text">Cancel</button>
            </form>
            <button id="show-edit-btn" class="btn-secondary" style="margin-top: 20px;">Edit Profile</button>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));
            const token = localStorage.getItem('token');

            if (!token) {
                window.location.href = 'index.html';
                return;
            }

            const profileDisplay = document.getElementById('profile-display');
            const editForm = document.getElementById('edit-profile-form');
            const showEditBtn = document.getElementById('show-edit-btn');
            const cancelEditBtn = document.getElementById('cancel-edit');

            function renderProfile() {
                profileDisplay.innerHTML = `
                    <div style="text-align: center; margin-bottom: 20px;">
                        <img src="${user.profileImage || 'https://via.placeholder.com/150'}" style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 3px solid #6c5ce7;">
                    </div>
                    <p><strong>Name:</strong> ${user.firstName} ${user.lastName}</p>
                    <p><strong>Email:</strong> ${user.email || 'Not provided'}</p>
                    <p><strong>Phone:</strong> ${user.phone || 'Not provided'}</p>
                    <p><strong>Gender:</strong> ${user.gender || 'Not specified'}</p>
                    <p><strong>Role:</strong> ${user.isSeller ? 'Seller' : 'Customer'}</p>
                `;
            }

            renderProfile();

            showEditBtn.addEventListener('click', () => {
                profileDisplay.style.display = 'none';
                showEditBtn.style.display = 'none';
                editForm.style.display = 'block';

                document.getElementById('edit-fname').value = user.firstName;
                document.getElementById('edit-lname').value = user.lastName;
                document.getElementById('edit-gender').value = user.gender || 'Male';
                document.getElementById('edit-pimg').value = user.profileImage || '';
            });

            cancelEditBtn.addEventListener('click', () => {
                profileDisplay.style.display = 'block';
                showEditBtn.style.display = 'block';
                editForm.style.display = 'none';
            });

            editForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const updatedData = {
                    firstName: document.getElementById('edit-fname').value,
                    lastName: document.getElementById('edit-lname').value,
                    gender: document.getElementById('edit-gender').value,
                    profileImage: document.getElementById('edit-pimg').value
                };

                try {
                    // Assuming we'll add an update endpoint or reuse verify-otp/register logic if needed
                    // For now, let's update local storage to simulate
                    const newUser = { ...user, ...updatedData };
                    localStorage.setItem('user', JSON.stringify(newUser));
                    alert('Profile updated locally (In a real app, this calls the backend)');
                    location.reload();
                } catch (err) {
                    console.error(err);
                }
            });

            document.getElementById('logout-btn').addEventListener('click', () => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>
